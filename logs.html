<!DOCTYPE html>
<html lang="it" data-bs-theme="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Logs - Oppeado</title>
  <link rel="icon" type="image/png" href="logo.PNG">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #05060d;
      color: #f7f7ff;
      min-height: 100vh;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2rem;
    }

    .log-item {
      padding: 1rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      border-left: 4px solid #5865f2; /* Discord Blurple */
      margin-bottom: 1rem;
      transition: background 0.2s;
    }

    .log-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .log-create { border-left-color: #23a55a; } /* Green */
    .log-update { border-left-color: #f0b232; } /* Yellow/Orange */
    .log-delete { border-left-color: #f23f43; } /* Red */

    .log-user {
      font-weight: 600;
      color: #fff;
    }

    .log-action {
      color: #b5bac1;
      font-size: 0.9rem;
    }

    .log-time {
      color: #949ba4;
      font-size: 0.8rem;
    }

    .log-details {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.75rem;
      border-radius: 8px;
      margin-top: 0.5rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      color: #dbdee1;
      overflow-x: auto;
    }

    .diff-old { color: #f23f43; text-decoration: line-through; }
    .diff-new { color: #23a55a; }

    #loginSection {
      max-width: 400px;
      margin: 100px auto;
    }
  </style>
</head>

<body>

  <!-- NAVBAR ADMIN -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="backdrop-filter: blur(12px); background-color: rgba(5, 6, 13, .86);">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <img src="logo.PNG" style="height: 32px;">
        <span class="fw-semibold text-white">Admin Logs</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav" aria-controls="adminNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="adminNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item me-lg-3">
            <span class="nav-link text-info d-flex align-items-center gap-1">
              <i class='bx bx-user-circle fs-5'></i>
              <span id="currentUserDisplay">...</span>
            </span>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="admin.html"><i class='bx bx-arrow-back me-1'></i> Torna Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="index.html"><i class='bx bx-home-alt me-1'></i> Home Pubblica</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5" style="padding-top: 100px !important;">
    <!-- SEZIONE LOGIN (Se non loggato) -->
    <div id="loginSection" class="glass-card text-center d-none">
      <img src="logo.PNG" alt="Logo" class="mb-4" style="height: 60px;">
      <h2 class="mb-4">Accesso Registri</h2>
      <p class="text-muted">Effettua il login come amministratore per vedere i log.</p>
      <a href="admin.html" class="btn btn-info w-100">Vai al Login</a>
    </div>

    <!-- REGISTRO ATTIVITÀ -->
    <div id="logsDashboard" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
          <h1 class="h2 mb-1"><i class='bx bx-list-ul text-info'></i> Registri di Verifica</h1>
          <p class="text-muted mb-0">Storico delle azioni amministrative della comunità</p>
        </div>
        <div class="d-flex gap-2">
          <a href="admin.html" class="btn btn-outline-light btn-sm"><i class='bx bx-arrow-back'></i> Torna Dashboard</a>
          <button id="refreshLogs" class="btn btn-info btn-sm"><i class='bx bx-refresh'></i> Aggiorna</button>
        </div>
      </div>

      <div class="glass-card">
        <div id="fullLogsList">
          <div class="text-center py-5">
            <div class="spinner-border text-info"></div>
            <p class="mt-2 text-muted">Caricamento registri...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="logs.js"></script>
  <script>
    // Logica specifica per la pagina logs.html
    document.addEventListener('DOMContentLoaded', async () => {
      // Inizializza Supabase (usiamo le stesse chiavi)
      const SUPABASE_URL = "https://fibkznmnroplmacvnsmj.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpYmt6bm1ucm9wbG1hY3Zuc21qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1MjczMTEsImV4cCI6MjA4NDEwMzMxMX0.8-Ra-QmU2KsMFktEO7RG27rREeFUm7_tsOe1nTx0ZZE";
      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      window.supabaseClient = supabaseClient;

      // Verifica sessione
      const { data: { session } } = await supabaseClient.auth.getSession();
      
      if (!session) {
        document.getElementById('loginSection').classList.remove('d-none');
        return;
      }

      // Verifica ruolo admin
      const { data: profile } = await supabaseClient
        .from('profiles')
        .select('role, username')
        .eq('id', session.user.id)
        .single();

      if (!profile || profile.role !== 'admin') {
        alert("Accesso negato. Solo gli amministratori possono vedere questa pagina.");
        window.location.href = 'index.html';
        return;
      }

      // Mostra nome utente nella navbar
      const userDisplay = document.getElementById('currentUserDisplay');
      if (userDisplay) userDisplay.innerText = profile.username;

      // Mostra dashboard logs
      document.getElementById('logsDashboard').classList.remove('d-none');
      
      // Carica i log
      loadLogsFull();

      document.getElementById('refreshLogs').onclick = loadLogsFull;
    });

    async function loadLogsFull() {
      const container = document.getElementById('fullLogsList');
      // La funzione loadLogs è in logs.js, ma qui ne faremo una versione più potente
      // o useremo quella esistente potenziata.
      if (window.renderDiscordLogs) {
        window.renderDiscordLogs(container);
      }
    }
  </script>
</body>

</html>
